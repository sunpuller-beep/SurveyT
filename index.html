<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교원역량 진단 설문</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0,24" rel="stylesheet">
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar__inner">
        <div>
          <p class="eyebrow">Teacher Growth Index</p>
          <h1 class="brand">교원역량 행동지표 설문</h1>
        </div>
        <div class="topbar__meta">
          <span class="meta-chip"><span class="material-symbols-outlined">fact_check</span> 4개 영역</span>
          <span class="meta-chip"><span class="material-symbols-outlined">query_stats</span> 72개 문항</span>
        </div>
      </div>
    </header>

    <main class="app-frame">
      <section class="hero-card" id="hero-card">
        <div>
          <p class="hero-card__part">Quarterly Review Format</p>
          <h2>한 페이지씩 넘기며 응답하는 교원역량 진단</h2>
          <p>
            제공된 설문 문항을 4개 대영역으로 나누어 구성했습니다. 각 문항은 1점부터 5점까지 선택하며,
            1은 <strong>아니다</strong>, 5는 <strong>그렇다</strong>를 의미합니다.
          </p>
        </div>
        <div class="hero-card__aside">
          <div class="hero-stat">
            <span class="hero-stat__label">응답 방식</span>
            <strong>Likert 5점 척도</strong>
          </div>
          <div class="hero-stat">
            <span class="hero-stat__label">결과 화면</span>
            <strong>영역별 파이차트</strong>
          </div>
        </div>
      </section>

      <section class="survey-app" id="app">
        <div class="loading-state">설문 구성을 불러오는 중입니다.</div>
      </section>
    </main>
  </div>

  <script defer src="/main.js"></script>
</body>
</html>
